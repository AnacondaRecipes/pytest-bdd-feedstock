{% set name = "pytest-bdd" %}
{% set version = "8.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: ef0896c5cd58816dc49810e8ff1d632f4a12019fb3e49959b2d349ffc1c9bfb5

build:
  number: 0
  skip: true  # [py<39]
  entry_points:
    - pytest-bdd = pytest_bdd.scripts:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    - poetry-core
  run:
    - python
    - mako
    - parse
    - parse_type
    - pytest >=7.0.0
    - typing-extensions
    - typing_extensions
    - packaging
    - gherkin-official >=29.0.0,<30.0.0

test:
  imports:
    - pytest_bdd
  requires:
    - pip
  commands:
    - pip check
    - pytest-bdd --help

about:
  home: https://github.com/pytest-dev/pytest-bdd
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: BDD for pytest
  description: pytest-bdd implements a subset of the Gherkin language to enable automating project requirements testing and to facilitate behavioral driven development.
  dev_url: https://github.com/pytest-dev/pytest-bdd
  doc_url: https://pytest-bdd.readthedocs.io

extra:
  recipe-maintainers:
    - m0nonoke
    - PertuyF
    - breathe
  skip-lints:
    - missing_wheel